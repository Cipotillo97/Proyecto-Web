<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabla de juegos</title>

    <style>

        body{
            font-family: Arial, sans-serif;
            background-color: #f0f0f0;

            /* Centrar todo */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        /* Caja alrededor de la tabla */
        #tabla{
            background-color: white;
            padding: 25px;
            border: 5px solid #4CAF50;
            border-radius: 15px;
            box-shadow: 0px 0px 15px rgba(0,0,0,0.3);
            text-align: center;
        }

        table{
            border-collapse: collapse;
            width: 500px;
        }

        th, td{
            border: 1px solid black;
            padding: 12px;
            text-align: center;
        }

        th{
            background-color: #4CAF50;
            color: white;
        }

        tr:nth-child(even){
            background-color: #f2f2f2;
        }

    </style>
</head>
<body>

    <section id="tabla">

        <h2>Tabla de información</h2>

        <table>

            <tr>
                <th>Juego</th>
                <th>Género</th>
                <th>Año</th>
            </tr>

            <tr>
                <td>Brawl Stars</td>
                <td>Acción</td>
                <td>2018</td>
            </tr>

            <tr>
                <td>Minecraft</td>
                <td>Supervivencia</td>
                <td>2011</td>
            </tr>

            <tr>
                <td>Fortnite</td>
                <td>Battle Royale</td>
                <td>2017</td>
            </tr>

        </table>

    </section>

</body>
</html>
